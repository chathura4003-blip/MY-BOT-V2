<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supreme MD Bot | Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed'},dark:{800:'#1e1b2e',900:'#13111e',card:'#1f1d30',border:'#2e2b45'}}}}}</script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0d1a;color:#e2e0f0;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#13111e;}
::-webkit-scrollbar-thumb{background:#3d3a5a;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#5a5580;}
.sidebar{width:240px;background:#0d0b18;border-right:1px solid #1e1b2e;display:flex;flex-direction:column;padding:0 10px 16px;flex-shrink:0;transition:width .3s;overflow:hidden;}
.sidebar.collapsed{width:64px;}
.sidebar-link{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:.875rem;color:#7c738a;white-space:nowrap;overflow:hidden;}
.sidebar-link:hover{background:#1e1b2e;color:#c4c0d8;}
.sidebar-link.active{background:linear-gradient(135deg,#7c3aed1a,#6d28d91a);color:#a78bfa;border-left:2px solid #8b5cf6;padding-left:10px;}
.sidebar-link .icon{font-size:1.1rem;flex-shrink:0;width:22px;text-align:center;}
.card{background:#16132a;border:1px solid #1e1b2e;border-radius:14px;padding:20px;}
.card-sm{background:#16132a;border:1px solid #1e1b2e;border-radius:12px;padding:14px;}
.badge{padding:2px 9px;border-radius:99px;font-size:.72rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.badge-green{background:#16a34a18;color:#4ade80;border:1px solid #16a34a33;}
.badge-red{background:#dc262618;color:#f87171;border:1px solid #dc262633;}
.badge-yellow{background:#d9770618;color:#fbbf24;border:1px solid #d9770633;}
.badge-blue{background:#2563eb18;color:#60a5fa;border:1px solid #2563eb33;}
.badge-purple{background:#7c3aed18;color:#a78bfa;border:1px solid #7c3aed33;}
.badge-gray{background:#2e2b4533;color:#7c738a;border:1px solid #2e2b45;}
.badge-orange{background:#ea580c18;color:#fb923c;border:1px solid #ea580c33;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:.825rem;font-weight:500;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px #7c3aed44;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-danger{background:#dc262610;color:#f87171;border:1px solid #dc262630;}
.btn-danger:hover{background:#dc262622;}
.btn-ghost{background:#1e1b2e88;color:#a09cc0;border:1px solid #2e2b45;}
.btn-ghost:hover{background:#2e2b45;color:#e2e0f0;}
.btn-green{background:#16a34a18;color:#4ade80;border:1px solid #16a34a33;}
.btn-green:hover{background:#16a34a28;}
.btn-yellow{background:#d9770618;color:#fbbf24;border:1px solid #d9770633;}
.btn-yellow:hover{background:#d9770628;}
.btn-sm{padding:4px 10px;font-size:.78rem;}
.input{background:#0f0d1a;border:1px solid #2e2b45;border-radius:8px;padding:8px 12px;color:#e2e0f0;font-size:.875rem;width:100%;outline:none;transition:border-color .2s;}
.input:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px #8b5cf611;}
.input::placeholder{color:#4c4775;}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:11px 16px;border-radius:10px;font-size:.825rem;font-weight:500;animation:slideIn .25s ease;max-width:320px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px #0008;}
.toast-success{background:#16a34a;color:#fff;}
.toast-error{background:#dc2626;color:#fff;}
.toast-info{background:#2563eb;color:#fff;}
.toast-warn{background:#d97706;color:#fff;}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(110%)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.stat-card{background:linear-gradient(145deg,#16132a,#1c1830);border:1px solid #1e1b2e;border-radius:14px;padding:18px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;opacity:.06;}
.log-line{font-family:'JetBrains Mono','Courier New',monospace;font-size:.75rem;padding:4px 8px;border-radius:4px;line-height:1.6;color:#a09cc0;}
.log-line:hover{background:#1e1b2e;}
.log-warn{color:#fbbf24;}
.log-error{color:#f87171;}
.log-info{color:#60a5fa;}
.toggle{position:relative;display:inline-block;width:42px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#2e2b45;border-radius:22px;transition:.25s;}
.toggle-slider:before{position:absolute;content:'';height:16px;width:16px;left:3px;bottom:3px;background:#7c738a;border-radius:50%;transition:.25s;}
input:checked+.toggle-slider{background:#8b5cf6;}
input:checked+.toggle-slider:before{transform:translateX(20px);background:#fff;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:9px 12px;font-size:.72rem;font-weight:600;color:#7c738a;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1e1b2e;}
td{padding:10px 12px;font-size:.825rem;border-bottom:1px solid #1e1b2e22;color:#c4c0d8;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#1e1b2e44;}
.modal-overlay{position:fixed;inset:0;background:#000000b0;z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
.modal{background:#12101f;border:1px solid #2e2b45;border-radius:18px;padding:26px;width:100%;max-height:90vh;overflow-y:auto;}
.qr-img{border-radius:12px;background:#fff;display:block;}
.pair-code{font-family:monospace;font-size:1.9rem;font-weight:800;letter-spacing:.3em;color:#a78bfa;background:#7c3aed0d;border:2px dashed #7c3aed33;border-radius:10px;padding:14px 20px;text-align:center;user-select:all;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.session-card{background:#12101f;border:1px solid #1e1b2e;border-radius:13px;padding:16px;transition:all .2s;}
.session-card:hover{border-color:#2e2b45;}
.session-card.connected{border-color:#16a34a44;background:#16a34a04;}
.progress-bar{height:4px;background:#1e1b2e;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;}
.cmd-card{background:#12101f;border:1px solid #1e1b2e;border-radius:10px;padding:12px 14px;transition:border-color .2s;}
.cmd-card:hover{border-color:#3d3a5a;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:1.3rem;font-weight:700;color:#e2e0f0;}
.divider{border:none;border-top:1px solid #1e1b2e;margin:16px 0;}
.glow-purple{box-shadow:0 0 20px #8b5cf622;}
.tab-bar{display:flex;border-bottom:1px solid #1e1b2e;margin-bottom:20px;gap:2px;}
.tab{padding:8px 16px;border:none;background:transparent;cursor:pointer;color:#7c738a;border-bottom:2px solid transparent;font-size:.875rem;font-weight:500;transition:all .2s;}
.tab.active{color:#a78bfa;border-bottom-color:#8b5cf6;}
.tab:hover{color:#c4c0d8;}
.empty-state{text-align:center;padding:48px 20px;}
.empty-state .icon{font-size:3rem;margin-bottom:12px;display:block;}
.empty-state h3{font-size:1rem;font-weight:600;color:#c4c0d8;margin-bottom:6px;}
.empty-state p{font-size:.825rem;color:#7c738a;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const socket = typeof io !== 'undefined' ? io() : null;

function api(path, opts = {}) {
  const token = localStorage.getItem('admin_token');
  return fetch(path, {
    headers: { 'Content-Type':'application/json', ...(token ? { Authorization:'Bearer '+token } : {}) },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(r => r.json());
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  const icons = { success:'✅', error:'❌', info:'ℹ️', warn:'⚠️' };
  const Toasts = () => (
    <div style={{position:'fixed',top:16,right:16,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
      {toasts.map(t => <div key={t.id} className={`toast toast-${t.type}`}><span>{icons[t.type]}</span><span>{t.msg}</span></div>)}
    </div>
  );
  return { show, Toasts };
}

function fmtUptime(s) {
  if (!s) return '—';
  if (s < 60) return s+'s';
  if (s < 3600) return Math.floor(s/60)+'m '+Math.floor(s%60)+'s';
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';
}
function fmtDate(d) { return d ? new Date(d).toLocaleString() : '—'; }
function fmtDateShort(d) { return d ? new Date(d).toLocaleDateString() : '—'; }
function extIcon(ext) {
  return {mp4:'🎬',mp3:'🎧',m4a:'🎵',webm:'🎞️',mkv:'📽️',jpg:'🖼️',png:'🖼️',gif:'🎠',pdf:'📄'}[ext]||'📁';
}

function statusBadgeClass(s) {
  if (s === 'Connected') return 'badge-green';
  if (['Connecting','Restoring','Initializing'].includes(s)) return 'badge-yellow';
  if (s === 'Awaiting QR Scan') return 'badge-blue';
  if (['Logged Out','Error','Disconnected'].includes(s)) return 'badge-red';
  return 'badge-gray';
}

function StatusBadge({ status }) {
  const icons = { Connected:'●', Disconnected:'●', Connecting:'●', 'Awaiting QR Scan':'◌', 'Logged Out':'●', Error:'●', Restoring:'↺', Initializing:'⏳' };
  const colors = { Connected:'#4ade80', Disconnected:'#f87171', Connecting:'#fbbf24', 'Awaiting QR Scan':'#60a5fa', 'Logged Out':'#f87171', Error:'#f87171', Restoring:'#fbbf24', Initializing:'#fbbf24' };
  return (
    <span className={`badge ${statusBadgeClass(status)}`} style={{gap:5}}>
      <span style={{color:colors[status]||'#7c738a',fontSize:'.6rem'}}>{icons[status]||'●'}</span>
      {status||'Unknown'}
    </span>
  );
}

function Toggle({ checked, onChange }) {
  return <label className="toggle"><input type="checkbox" checked={!!checked} onChange={e=>onChange(e.target.checked)}/><span className="toggle-slider"></span></label>;
}

function Spinner() {
  return <span className="spin" style={{display:'inline-block',fontSize:'1rem'}}>⏳</span>;
}

function ErrorBox({ msg }) {
  return <div style={{background:'#dc262610',border:'1px solid #dc262630',borderRadius:8,padding:'10px 14px',color:'#f87171',fontSize:'.825rem',marginBottom:14}}>{msg}</div>;
}

// ── Login Page ───────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [form, setForm] = useState({ username:'', password:'' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [showPass, setShowPass] = useState(false);

  async function submit(e) {
    e.preventDefault(); setLoading(true); setError('');
    try {
      const r = await fetch('/bot-api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form)
      });
      const d = await r.json();
      if (d.token) { localStorage.setItem('admin_token', d.token); onLogin(d); }
      else setError(d.error||'Invalid credentials');
    } catch { setError('Cannot reach server — is the bot running?'); }
    setLoading(false);
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'radial-gradient(ellipse at 25% 25%,#7c3aed0d,transparent 50%),radial-gradient(ellipse at 75% 75%,#2563eb0d,transparent 50%),#0f0d1a'}}>
      <div style={{width:'100%',maxWidth:400,padding:'0 16px'}}>
        <div className="card glow-purple" style={{padding:36}}>
          <div style={{textAlign:'center',marginBottom:32}}>
            <div style={{fontSize:'3rem',marginBottom:12}}>🤖</div>
            <h1 style={{fontSize:'1.6rem',fontWeight:800,background:'linear-gradient(135deg,#a78bfa,#60a5fa)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginBottom:4}}>Supreme MD Bot</h1>
            <p style={{color:'#4c4775',fontSize:'.85rem'}}>Admin Control Panel</p>
          </div>
          <form onSubmit={submit}>
            <div style={{marginBottom:14}}>
              <label style={{display:'block',fontSize:'.75rem',color:'#7c738a',marginBottom:6,fontWeight:600,letterSpacing:'.05em'}}>USERNAME</label>
              <input className="input" placeholder="admin" value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} autoFocus autoComplete="username"/>
            </div>
            <div style={{marginBottom:22}}>
              <label style={{display:'block',fontSize:'.75rem',color:'#7c738a',marginBottom:6,fontWeight:600,letterSpacing:'.05em'}}>PASSWORD</label>
              <div style={{position:'relative'}}>
                <input className="input" type={showPass?'text':'password'} style={{paddingRight:40}} placeholder="••••••••••" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} autoComplete="current-password"/>
                <button type="button" onClick={()=>setShowPass(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#7c738a',fontSize:'1rem'}}>{showPass?'🙈':'👁️'}</button>
              </div>
            </div>
            {error && <ErrorBox msg={error}/>}
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px 16px',fontSize:'.95rem'}} disabled={loading}>
              {loading?<><Spinner/> Logging in...</>:'🔐 Login to Panel'}
            </button>
          </form>
        </div>
        <div style={{textAlign:'center',marginTop:16,fontSize:'.78rem',color:'#4c4775'}}>Supreme MD Bot v2.1 · Secure Admin Access</div>
      </div>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
const NAV = [
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'sessions', icon:'📱',label:'Sessions'},
  {id:'commands', icon:'🎮',label:'Commands'},
  {id:'users',    icon:'👥',label:'Users'},
  {id:'broadcast',icon:'📢',label:'Broadcast'},
  {id:'settings', icon:'⚙️', label:'Settings'},
  {id:'economy',  icon:'💰',label:'Economy'},
  {id:'files',    icon:'📁',label:'Files'},
  {id:'logs',     icon:'📜',label:'Logs'},
];

function Sidebar({ page, setPage, onLogout, botStatus, collapsed, setCollapsed }) {
  return (
    <div className={`sidebar ${collapsed?'collapsed':''}`}>
      <div style={{padding:'18px 8px 16px',display:'flex',alignItems:'center',justifyContent:collapsed?'center':'space-between',gap:8}}>
        {!collapsed && (
          <div>
            <div style={{fontWeight:800,fontSize:'1rem',color:'#e2e0f0',letterSpacing:'-.01em'}}>Supreme MD</div>
            <div style={{marginTop:5}}><StatusBadge status={botStatus}/></div>
          </div>
        )}
        {collapsed && <div style={{fontSize:'1.4rem'}}>🤖</div>}
        <button onClick={()=>setCollapsed(c=>!c)} style={{background:'none',border:'none',cursor:'pointer',color:'#4c4775',fontSize:'1rem',padding:4,flexShrink:0}} title="Toggle sidebar">
          {collapsed?'▶':'◀'}
        </button>
      </div>
      <hr className="divider" style={{margin:'0 4px 8px'}}/>
      <nav style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(n => (
          <div key={n.id} className={`sidebar-link ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)} title={collapsed?n.label:''}>
            <span className="icon">{n.icon}</span>
            {!collapsed && <span>{n.label}</span>}
          </div>
        ))}
      </nav>
      <hr className="divider" style={{margin:'8px 4px'}}/>
      <button className="btn btn-danger" style={{width:'100%',justifyContent:collapsed?'center':'flex-start',padding:'8px 12px'}} onClick={onLogout} title={collapsed?'Logout':''}>
        <span>🚪</span>{!collapsed&&<span>Logout</span>}
      </button>
    </div>
  );
}

// ── Dashboard Page ───────────────────────────────────────────────────────────
function DashboardPage({ toast }) {
  const [stats, setStats] = useState(null);
  const chartRef = useRef(null);
  const chartInst = useRef(null);
  const cpuRef = useRef(null);
  const cpuInst = useRef(null);

  const load = useCallback(() => api('/bot-api/stats').then(s => { if (!s.error) setStats(s); }), []);

  useEffect(() => { load(); const iv = setInterval(load, 8000); return () => clearInterval(iv); }, []);

  useEffect(() => {
    if (!stats || !chartRef.current) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current, {
      type:'doughnut',
      data:{ labels:['Used','Free'], datasets:[{ data:[stats.memUsed, stats.memTotal-stats.memUsed], backgroundColor:['#8b5cf6','#1e1b2e'], borderWidth:0, hoverOffset:4 }] },
      options:{ plugins:{ legend:{ display:false } }, cutout:'76%', animation:{ duration:600 } }
    });
  }, [stats?.memUsed]);

  if (!stats) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:300,gap:12,color:'#4c4775'}}><Spinner/> Loading dashboard...</div>;

  const net = stats.net || {};
  const netRxPct = Math.min(100, net.speedRxRaw ? Math.round(Math.log10(net.speedRxRaw + 1) / Math.log10(1024 * 1024) * 100) : 0);
  const netTxPct = Math.min(100, net.speedTxRaw ? Math.round(Math.log10(net.speedTxRaw + 1) / Math.log10(1024 * 1024) * 100) : 0);

  const statCards = [
    { icon:'📱', label:'Bot Status',   value:<StatusBadge status={stats.status}/>, sub:stats.number||'Not connected', color:'#8b5cf6' },
    { icon:'👥', label:'Total Users',  value:stats.userCount.toLocaleString(), sub:'in database', color:'#60a5fa' },
    { icon:'📁', label:'Cached Files', value:stats.fileCount, sub:stats.fileSizeMB+' MB used', color:'#4ade80' },
    { icon:'⏱️', label:'Uptime',       value:fmtUptime(stats.uptime), sub:'Node '+stats.nodeVersion, color:'#fbbf24' },
    { icon:'🧠', label:'RAM Used',     value:stats.memPercent+'%', sub:stats.memUsed+' / '+stats.memTotal+' MB', color:'#f87171' },
    { icon:'⚡', label:'CPU Load',     value:stats.cpuLoad, sub:'1-min avg', color:'#fb923c' },
    { icon:'⬇️', label:'Download Speed', value:net.speedRx||'0 B/s', sub:'Live RX speed', color:'#34d399' },
    { icon:'⬆️', label:'Upload Speed',   value:net.speedTx||'0 B/s', sub:'Live TX speed', color:'#818cf8' },
  ];

  return (
    <div style={{padding:24,maxWidth:1200}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">📊 Dashboard</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>Real-time bot overview · updates every 8s</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={load}>🔄 Refresh</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:12,marginBottom:20}}>
        {statCards.map((c,i) => (
          <div key={i} className="stat-card" style={{['--accent']:c.color}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{fontSize:'.68rem',color:'#4c4775',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,fontWeight:600}}>{c.label}</div>
                <div style={{fontSize:'1.25rem',fontWeight:800,color:c.color,marginBottom:3,lineHeight:1}}>{c.value}</div>
                <div style={{fontSize:'.72rem',color:'#7c738a',marginTop:6}}>{c.sub}</div>
              </div>
              <div style={{fontSize:'1.3rem',opacity:.4,marginLeft:8}}>{c.icon}</div>
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:14}}>
        {/* Memory */}
        <div className="card">
          <div style={{fontWeight:600,marginBottom:14,color:'#c4c0d8',fontSize:'.875rem'}}>💾 Memory (RAM)</div>
          <div style={{display:'flex',alignItems:'center',gap:18}}>
            <div style={{position:'relative',width:110,height:110,flexShrink:0}}>
              <canvas ref={chartRef} width={110} height={110}></canvas>
              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                <div style={{fontSize:'1.2rem',fontWeight:800,color:'#a78bfa'}}>{stats.memPercent}%</div>
                <div style={{fontSize:'.62rem',color:'#4c4775'}}>{stats.memTotal}MB</div>
              </div>
            </div>

// ── Connect Session Modal ────────────────────────────────────────────────────
function ConnectModal({ onClose, onCreated, toast }) {
  const [step, setStep] = useState('setup');
  const [sessionId, setSessionId] = useState('');
  const [method, setMethod] = useState('qr');
  const [phone, setPhone] = useState('');
  const [qrData, setQrData] = useState(null);
  const [pairCode, setPairCode] = useState(null);
  const [pairExpiresAt, setPairExpiresAt] = useState(null);
  const [countdown, setCountdown] = useState(0);
  const [pairError, setPairError] = useState('');
  const [status, setStatus] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [copied, setCopied] = useState(false);
  const currentSessionId = React.useRef('');

  // Countdown timer for pair code
  useEffect(() => {
    if (!pairExpiresAt) return;
    const iv = setInterval(() => {
      const left = Math.max(0, Math.round((pairExpiresAt - Date.now()) / 1000));
      setCountdown(left);
      if (left === 0) clearInterval(iv);
    }, 500);
    return () => clearInterval(iv);
  }, [pairExpiresAt]);

  // Socket.IO listeners
  useEffect(() => {
    if (!socket || !currentSessionId.current) return;
    const sid = currentSessionId.current;
    const onUpdate = (d) => {
      if (d.id !== sid) return;
      setStatus(d.status || '');
      if (d.qr) setQrData(d.qr);
      if (d.pairCode) { setPairCode(d.pairCode); setPairExpiresAt(d.pairCodeExpiresAt || Date.now() + 60000); setPairError(''); }
      if (d.pairCodeError) setPairError(d.pairCodeError);
      if (d.status === 'Connected') { toast(`✅ Session "${sid}" connected!`, 'success'); onCreated(); onClose(); }
    };
    const onQr = (d) => { if (d.id !== sid) return; setQrData(d.qr); setStatus('Awaiting QR Scan'); };
    const onPaircode = (d) => { if (d.id !== sid) return; setPairCode(d.code); setPairExpiresAt(d.expiresAt || Date.now() + 60000); setPairError(''); };
    socket.on('session:update', onUpdate);
    socket.on('session:qr', onQr);
    socket.on('session:paircode', onPaircode);
    return () => { socket.off('session:update', onUpdate); socket.off('session:qr', onQr); socket.off('session:paircode', onPaircode); };
  }, [step]);

  async function create() {
    const id = sessionId.trim();
    if (!id || !/^[a-zA-Z0-9_-]{2,30}$/.test(id)) return setError('Use 2–30 letters, numbers, _ or -');
    if (method === 'pair') {
      const cleaned = phone.replace(/[^0-9]/g, '');
      if (!cleaned || cleaned.length < 7) return setError('Enter your WhatsApp number with country code (e.g. 94712345678)');
    }
    setLoading(true); setError('');
    const body = { id };
    if (method === 'pair') { body.pairMode = true; body.phone = phone.replace(/[^0-9]/g, ''); }
    const r = await api('/bot-api/sessions', { method:'POST', body });
    if (r.error) { setError(r.error); setLoading(false); return; }
    currentSessionId.current = id;
    setStep('connecting'); setStatus('Connecting...'); setLoading(false);
  }

  async function resendCode() {
    setPairCode(null); setPairExpiresAt(null); setPairError(''); setLoading(true);
    const r = await api(`/bot-api/sessions/${currentSessionId.current}/paircode`, { method:'POST', body:{ phone } });
    setLoading(false);
    if (r.error) { setPairError(r.error); return; }
    setPairCode(r.code); setPairExpiresAt(Date.now() + 60000);
  }

  function copyCode() {
    if (!pairCode) return;
    const formatted = pairCode.match(/.{1,4}/g)?.join('-') || pairCode;
    navigator.clipboard.writeText(formatted).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }

  const fmtCode = (c) => c?.match(/.{1,4}/g)?.join('-') || c || '';
  const codeExpired = pairExpiresAt && countdown === 0;

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:500}}>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
          <div>
            <h3 style={{fontSize:'1.1rem',fontWeight:700,color:'#e2e0f0',margin:0}}>
              {step==='setup' ? '➕ Connect WhatsApp' : method==='pair' ? '🔑 Pair Code' : '📷 Scan QR Code'}
            </h3>
            {step!=='setup' && <div style={{fontSize:'.75rem',color:'#4c4775',marginTop:3}}>Session: <code style={{color:'#a78bfa'}}>{currentSessionId.current}</code> · <StatusBadge status={status||'Connecting'}/></div>}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose} style={{fontSize:'1rem',padding:'4px 10px'}}>✕</button>
        </div>

        {/* ── Step 1: Setup ──────────────────────────────────────────────────── */}
        {step === 'setup' && (
          <div style={{display:'flex',flexDirection:'column',gap:18}}>
            <div>
              <label style={{display:'block',fontSize:'.72rem',color:'#7c738a',marginBottom:7,fontWeight:700,letterSpacing:'.05em'}}>SESSION NAME</label>
              <input className="input" placeholder="e.g. mybot, work, personal" value={sessionId}
                onChange={e=>setSessionId(e.target.value)} onKeyDown={e=>e.key==='Enter'&&create()} autoFocus/>
              <div style={{fontSize:'.7rem',color:'#4c4775',marginTop:5}}>Letters, numbers, _ and - only · 2–30 characters</div>
            </div>

            <div>
              <label style={{display:'block',fontSize:'.72rem',color:'#7c738a',marginBottom:10,fontWeight:700,letterSpacing:'.05em'}}>CONNECTION METHOD</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {[
                  ['qr', '📷', 'QR Code', 'Scan QR with your WhatsApp camera — quick & easy'],
                  ['pair', '🔑', 'Pair Code', 'Enter an 8-digit code — works on any device'],
                ].map(([val, icon, title, desc]) => (
                  <div key={val} onClick={()=>{setMethod(val);setError('');}} style={{
                    border:`2px solid ${method===val?'#8b5cf6':'#1e1b2e'}`,
                    borderRadius:12, padding:'14px 16px', cursor:'pointer',
                    background:method===val?'linear-gradient(135deg,#7c3aed18,#7c3aed08)':'transparent',
                    transition:'all .18s', position:'relative'
                  }}>
                    {method===val && <div style={{position:'absolute',top:8,right:10,width:8,height:8,borderRadius:'50%',background:'#8b5cf6'}}/>}
                    <div style={{fontSize:'1.4rem',marginBottom:6}}>{icon}</div>
                    <div style={{fontWeight:700,color:method===val?'#a78bfa':'#c4c0d8',fontSize:'.9rem',marginBottom:4}}>{title}</div>
                    <div style={{fontSize:'.72rem',color:'#4c4775',lineHeight:1.4}}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {method === 'pair' && (
              <div style={{animation:'fadeIn .2s ease'}}>
                <label style={{display:'block',fontSize:'.72rem',color:'#7c738a',marginBottom:7,fontWeight:700,letterSpacing:'.05em'}}>WHATSAPP NUMBER</label>
                <input className="input" placeholder="94712345678  (country code + number, no +)"
                  value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={e=>e.key==='Enter'&&create()}/>
                <div style={{fontSize:'.7rem',color:'#4c4775',marginTop:5}}>Include country code — no spaces, dashes or + sign</div>
              </div>
            )}

            {error && <ErrorBox msg={error}/>}

            <div style={{display:'flex',gap:10,paddingTop:4}}>
              <button className="btn btn-primary" onClick={create} disabled={loading} style={{flex:1,justifyContent:'center',fontSize:'.9rem',padding:'10px 0'}}>
                {loading?<><Spinner/> Starting...</>: method==='pair'?'🔑 Create & Get Pair Code':'📷 Create & Show QR'}
              </button>
              <button className="btn btn-ghost" onClick={onClose} style={{padding:'10px 18px'}}>Cancel</button>
            </div>
          </div>
        )}

        {/* ── Step 2: QR Mode ────────────────────────────────────────────────── */}
        {step === 'connecting' && method === 'qr' && (
          <div style={{display:'flex',flexDirection:'column',gap:16,alignItems:'center'}}>
            {/* QR Box */}
            <div style={{position:'relative'}}>
              {qrData ? (
                <div style={{padding:10,background:'#fff',borderRadius:14,boxShadow:'0 0 0 3px #8b5cf633'}}>
                  <img src={qrData} alt="QR Code" style={{width:240,height:240,display:'block',borderRadius:8}}/>
                </div>
              ) : (
                <div style={{width:260,height:260,background:'#0f0d1a',border:'2px dashed #1e1b2e',borderRadius:14,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>
                  <Spinner/>
                  <div style={{fontSize:'.85rem',color:'#4c4775'}}>Generating QR code...</div>
                </div>
              )}
            </div>

            {/* Instructions */}
            <div style={{width:'100%',background:'#0f0d1a',borderRadius:12,padding:'14px 18px'}}>
              <div style={{fontWeight:700,color:'#c4c0d8',fontSize:'.825rem',marginBottom:10}}>How to scan:</div>
              {[
                ['1','Open WhatsApp on your phone'],
                ['2','Tap ⋮ Menu → Linked Devices'],
                ['3','Tap "Link a Device"'],
                ['4','Point camera at the QR code above'],
              ].map(([n,t])=>(
                <div key={n} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:7}}>
                  <div style={{minWidth:22,height:22,borderRadius:6,background:'#8b5cf622',border:'1px solid #8b5cf644',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.72rem',fontWeight:800,color:'#a78bfa'}}>{n}</div>
                  <span style={{fontSize:'.8rem',color:'#7c738a',lineHeight:1.5}}>{t}</span>
                </div>
              ))}
              <div style={{fontSize:'.72rem',color:'#4c4775',marginTop:8,paddingTop:8,borderTop:'1px solid #1e1b2e'}}>
                🔄 QR auto-refreshes · window closes automatically when connected
              </div>
            </div>

            <div style={{width:'100%',display:'flex',justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={onClose}>Close (session stays active)</button>
            </div>
          </div>
        )}

        {/* ── Step 2: Pair Code Mode ─────────────────────────────────────────── */}
        {step === 'connecting' && method === 'pair' && (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {/* Waiting for code */}
            {!pairCode && !pairError && (
              <div style={{textAlign:'center',padding:'32px 0',display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
                <Spinner/>
                <div style={{color:'#7c738a',fontSize:'.9rem'}}>Requesting pair code from WhatsApp...</div>
                <div style={{fontSize:'.75rem',color:'#4c4775'}}>This takes about 2-3 seconds</div>
              </div>
            )}

            {/* Error state */}
            {pairError && !pairCode && (
              <div style={{display:'flex',flexDirection:'column',gap:12,alignItems:'center',textAlign:'center',padding:'12px 0'}}>
                <ErrorBox msg={pairError}/>
                <button className="btn btn-primary" onClick={resendCode} disabled={loading}>
                  {loading?<><Spinner/> Retrying...</>:'🔄 Retry Pair Code'}
                </button>
              </div>
            )}

            {/* Pair code display */}
            {pairCode && (
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                {/* Instructions banner */}
                <div style={{background:'#2563eb10',border:'1px solid #2563eb30',borderRadius:10,padding:'12px 14px',fontSize:'.8rem',color:'#93c5fd',lineHeight:1.6}}>
                  📱 <strong>WhatsApp</strong> → ⋮ Menu → <strong>Linked Devices</strong> → <strong>Link with Phone Number</strong> → enter code below
                </div>

                {/* Pair code big display */}
                <div style={{textAlign:'center'}}>
                  <div style={{fontSize:'.72rem',color:'#4c4775',marginBottom:10,fontWeight:600,letterSpacing:'.08em'}}>YOUR PAIR CODE</div>
                  <div style={{
                    fontFamily:'monospace', fontSize:'2.4rem', fontWeight:900, letterSpacing:'.35em',
                    color: codeExpired ? '#ef4444' : '#a78bfa',
                    background: codeExpired ? '#ef444410' : '#7c3aed0d',
                    border: `2px dashed ${codeExpired ? '#ef444430' : '#7c3aed33'}`,
                    borderRadius:14, padding:'18px 24px', display:'inline-block',
                    transition:'all .3s', userSelect:'all',
                    opacity: codeExpired ? .6 : 1,
                  }}>
                    {fmtCode(pairCode)}
                  </div>
                  {codeExpired && <div style={{color:'#ef4444',fontSize:'.8rem',marginTop:8}}>⚠️ Code expired — click Resend below</div>}
                </div>

                {/* Countdown + copy row */}
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  {/* Countdown */}
                  <div style={{
                    flex:1, background:'#0f0d1a', borderRadius:10, padding:'10px 14px',
                    display:'flex', alignItems:'center', gap:10
                  }}>
                    <div style={{fontSize:'1.3rem'}}>{codeExpired ? '⏰' : '⏳'}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'.68rem',color:'#4c4775',fontWeight:600}}>EXPIRES IN</div>
                      <div style={{fontFamily:'monospace',fontWeight:800,fontSize:'1.1rem',color: codeExpired ? '#ef4444' : countdown<=15?'#fbbf24':'#4ade80'}}>
                        {codeExpired ? 'Expired' : `${countdown}s`}
                      </div>
                    </div>
                    <div style={{width:38,height:38,borderRadius:'50%',background:'#1e1b2e',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',overflow:'hidden'}}>
                      {!codeExpired && <div style={{
                        position:'absolute',inset:0,borderRadius:'50%',
                        background:`conic-gradient(${countdown<=15?'#fbbf24':'#8b5cf6'} ${(countdown/60)*360}deg, #1e1b2e 0deg)`,
                        transition:'background .5s'
                      }}/>}
                      <div style={{width:28,height:28,borderRadius:'50%',background:'#0f0d1a',position:'relative',zIndex:1,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.75rem',fontWeight:800,color:'#c4c0d8'}}>
                        {codeExpired?'!':Math.round(countdown/60*10)*10}
                      </div>
                    </div>
                  </div>

                  {/* Copy button */}
                  <button onClick={copyCode} disabled={codeExpired}
                    className="btn btn-primary"
                    style={{padding:'10px 16px',flexShrink:0,gap:6,background:copied?'#059669':undefined,fontSize:'.85rem'}}>
                    {copied ? '✅ Copied!' : '📋 Copy'}
                  </button>
                </div>

                {/* Step guide */}
                <div style={{background:'#0f0d1a',borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontWeight:700,color:'#c4c0d8',fontSize:'.8rem',marginBottom:10}}>Step-by-step guide:</div>
                  {[
                    ['1','Open WhatsApp on your phone'],
                    ['2','Tap the ⋮ (3-dot menu) → Linked Devices'],
                    ['3','Tap "Link a Device" → "Link with phone number instead"'],
                    ['4','Enter the 8-character code above'],
                    ['5','Bot will connect automatically!'],
                  ].map(([n,t])=>(
                    <div key={n} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:7}}>
                      <div style={{minWidth:22,height:22,borderRadius:6,background:'#8b5cf622',border:'1px solid #8b5cf644',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:800,color:'#a78bfa',flexShrink:0}}>{n}</div>
                      <span style={{fontSize:'.78rem',color:'#7c738a',lineHeight:1.5}}>{t}</span>
                    </div>
                  ))}
                </div>

                {/* Resend + status row */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {!codeExpired && (
                      <div className="pulse" style={{color:'#a78bfa',fontSize:'.8rem',display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:6,height:6,borderRadius:'50%',background:'#a78bfa',animation:'pulse 1.5s infinite'}}/>
                        Waiting for WhatsApp...
                      </div>
                    )}
                    {codeExpired && (
                      <button className="btn btn-ghost btn-sm" onClick={resendCode} disabled={loading}>
                        {loading?<><Spinner/>Resending...</>:'🔄 Resend New Code'}
                      </button>
                    )}
                  </div>
                  <button className="btn btn-ghost btn-sm" onClick={onClose}>Close</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Sessions Page ────────────────────────────────────────────────────────────
function SessionsPage({ toast }) {
  const [mainSession, setMainSession] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [viewQR, setViewQR] = useState(null);

  async function loadAll() {
    const [main, list] = await Promise.all([api('/bot-api/bot/session'), api('/bot-api/sessions')]);
    setMainSession(main);
    setSessions(Array.isArray(list) ? list : []);
  }

  useEffect(() => {
    loadAll();
    if (!socket) return;
    const onUpdate = d => setSessions(prev => prev.map(s => s.id===d.id ? {...s,...d} : s));
    const onQr = d => setSessions(prev => prev.map(s => s.id===d.id ? {...s,qrDataUrl:d.qr,qrAvailable:true,status:'Awaiting QR Scan'} : s));
    const onRemoved = d => setSessions(prev => prev.filter(s => s.id!==d.id));
    socket.on('session:update', onUpdate);
    socket.on('session:qr', onQr);
    socket.on('session:removed', onRemoved);
    return () => { socket.off('session:update', onUpdate); socket.off('session:qr', onQr); socket.off('session:removed', onRemoved); };
  }, []);

  async function removeSession(id) {
    if (!confirm(`Remove session "${id}"? This will log it out and delete its data.`)) return;
    const r = await api(`/bot-api/sessions/${id}`, { method:'DELETE' });
    if (r.ok) { toast(`Session "${id}" removed`); loadAll(); }
    else toast(r.error, 'error');
  }

  async function logoutMain() {
    if (!confirm('Logout the main bot session?')) return;
    const r = await api('/bot-api/bot/session/logout', { method:'POST', body:{} });
    if (r.ok) { toast('Main session logged out'); loadAll(); }
    else toast(r.error, 'error');
  }

  return (
    <div style={{padding:24,maxWidth:1100}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">📱 Session Manager</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{sessions.length} additional session(s) active</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost btn-sm" onClick={loadAll}>🔄 Refresh</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowModal(true)}>➕ New Session</button>
        </div>
      </div>

      {mainSession && (
        <div style={{marginBottom:22}}>
          <div style={{fontSize:'.72rem',color:'#4c4775',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>🤖 Main Bot</div>
          <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:14,borderColor:mainSession.status==='Connected'?'#16a34a33':'#1e1b2e'}}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:'linear-gradient(135deg,#8b5cf6,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.4rem',flexShrink:0}}>🤖</div>
              <div>
                <div style={{fontWeight:700,color:'#e2e0f0',marginBottom:3}}>Main Bot Session</div>
                <div style={{fontFamily:'monospace',fontSize:'.85rem',color:'#a78bfa'}}>{mainSession.number||'Not connected'}</div>
                {mainSession.connectedAt && <div style={{fontSize:'.73rem',color:'#4c4775',marginTop:2}}>Since {new Date(mainSession.connectedAt).toLocaleString()}</div>}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <StatusBadge status={mainSession.status}/>
              {mainSession.status === 'Connected' && (
                <button className="btn btn-danger btn-sm" onClick={logoutMain}>🚪 Logout</button>
              )}
            </div>
          </div>
        </div>
      )}

      <div style={{fontSize:'.72rem',color:'#4c4775',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>👥 Additional Sessions</div>
      {sessions.length === 0 ? (
        <div className="card">
          <div className="empty-state">
            <span className="icon">📱</span>
            <h3>No additional sessions</h3>
            <p>Connect more WhatsApp accounts via QR code or pair code</p>
            <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setShowModal(true)}>➕ Connect New Session</button>
          </div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:14}}>
          {sessions.map(s => (
            <div key={s.id} className={`session-card ${s.status==='Connected'?'connected':''}`}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:38,height:38,borderRadius:'50%',background:`linear-gradient(135deg,${s.status==='Connected'?'#16a34a,#15803d':'#2e2b45,#1e1b2e'})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}}>
                    {s.status==='Connected'?'✅':s.status==='Awaiting QR Scan'?'📷':'📱'}
                  </div>
                  <div>
                    <div style={{fontWeight:700,color:'#e2e0f0',fontSize:'.9rem'}}>{s.id}</div>
                    <div style={{fontFamily:'monospace',fontSize:'.78rem',color:'#a78bfa'}}>{s.number||'—'}</div>
                  </div>
                </div>
                <button className="btn btn-danger btn-sm" onClick={()=>removeSession(s.id)}>🗑️</button>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <StatusBadge status={s.status}/>
                <div style={{display:'flex',gap:6}}>
                  {s.qrAvailable && <button className="btn btn-ghost btn-sm" onClick={()=>setViewQR(s.id)}>📷 QR</button>}
                  {s.startedAt && <span style={{fontSize:'.72rem',color:'#4c4775',alignSelf:'center'}}>{new Date(s.startedAt).toLocaleTimeString()}</span>}
                </div>
              </div>
              {s.pairCode && (
                <div style={{marginTop:12,background:'#7c3aed0d',border:'1px dashed #7c3aed33',borderRadius:8,padding:'8px 12px',textAlign:'center',fontFamily:'monospace',color:'#a78bfa',fontWeight:700,letterSpacing:'.2em',fontSize:'.875rem'}}>
                  {s.pairCode.match(/.{1,4}/g)?.join('-')||s.pairCode}
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {viewQR && (() => {
        const s = sessions.find(x => x.id === viewQR);
        return s ? (
          <div className="modal-overlay" onClick={()=>setViewQR(null)}>
            <div className="modal" style={{maxWidth:320,textAlign:'center'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                <h3 style={{fontWeight:700,color:'#e2e0f0'}}>📷 {s.id}</h3>
                <button className="btn btn-ghost btn-sm" onClick={()=>setViewQR(null)}>✕</button>
              </div>
              <StatusBadge status={s.status}/>
              <div style={{marginTop:16}}>
                {s.qrDataUrl ? <img src={s.qrDataUrl} alt="QR" className="qr-img" style={{width:260,height:260,margin:'0 auto'}}/> : <div style={{width:260,height:260,background:'#0f0d1a',border:'2px dashed #1e1b2e',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',color:'#4c4775'}}>No QR available</div>}
              </div>
              <div style={{marginTop:14,fontSize:'.78rem',color:'#4c4775'}}>WhatsApp → Linked Devices → Link a Device</div>
            </div>
          </div>
        ) : null;
      })()}

      {showModal && <ConnectModal onClose={()=>setShowModal(false)} onCreated={loadAll} toast={toast}/>}
    </div>
  );
}

// ── Commands Page ────────────────────────────────────────────────────────────
function CommandsPage() {
  const [commands, setCommands] = useState([]);
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('all');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    api('/bot-api/commands').then(d => { setCommands(Array.isArray(d)?d:[]); setLoading(false); });
  }, []);

  const categories = useMemo(() => ['all', ...new Set(commands.map(c => c.category))], [commands]);
  const filtered = useMemo(() => commands.filter(c => {
    const matchCat = category === 'all' || c.category === category;
    const q = search.toLowerCase();
    const matchSearch = !q || c.name.includes(q) || c.description.toLowerCase().includes(q) || c.aliases.some(a=>a.includes(q));
    return matchCat && matchSearch;
  }), [commands, search, category]);

  const catColors = { ai:'#60a5fa', download:'#4ade80', fun:'#fbbf24', economy:'#f87171', search:'#a78bfa', nsfw:'#fb923c', sticker:'#34d399', group:'#818cf8', system:'#94a3b8', owner:'#f472b6', premium:'#fcd34d', menu:'#a78bfa', delete:'#f87171' };

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,gap:12,color:'#4c4775'}}><Spinner/> Loading commands...</div>;

  return (
    <div style={{padding:24,maxWidth:1200}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">🎮 Command List</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{commands.length} commands loaded</div>
        </div>
        <input className="input" style={{width:240}} placeholder="🔍 Search commands..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20}}>
        {categories.map(cat => (
          <button key={cat} onClick={()=>setCategory(cat)} style={{padding:'5px 12px',borderRadius:99,border:'none',cursor:'pointer',fontSize:'.78rem',fontWeight:600,
            background:category===cat?(catColors[cat]||'#8b5cf6'):'#1e1b2e',
            color:category===cat?'#0f0d1a':'#7c738a',transition:'all .2s'}}>
            {cat === 'all' ? `All (${commands.length})` : cat}
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="card"><div className="empty-state"><span className="icon">🔍</span><h3>No commands found</h3><p>Try a different search term or category</p></div></div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
          {filtered.map(cmd => (
            <div key={cmd.name} className="cmd-card">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontFamily:'monospace',fontWeight:700,color:'#a78bfa',fontSize:'.875rem'}}>!{cmd.name}</span>
                  <span className="badge" style={{background:(catColors[cmd.category]||'#8b5cf6')+'18',color:catColors[cmd.category]||'#8b5cf6',border:'1px solid '+(catColors[cmd.category]||'#8b5cf6')+'33',fontSize:'.65rem'}}>{cmd.category}</span>
                </div>
              </div>
              {cmd.description && <div style={{fontSize:'.8rem',color:'#7c738a',marginBottom:8,lineHeight:1.5}}>{cmd.description}</div>}
              {cmd.aliases.length > 0 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                  {cmd.aliases.slice(0,6).map(a=>(
                    <span key={a} style={{fontSize:'.7rem',fontFamily:'monospace',color:'#4c4775',background:'#1e1b2e',padding:'2px 7px',borderRadius:4}}>!{a}</span>
                  ))}
                  {cmd.aliases.length > 6 && <span style={{fontSize:'.7rem',color:'#4c4775'}}>+{cmd.aliases.length-6} more</span>}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Users Page ───────────────────────────────────────────────────────────────
function UsersPage({ toast }) {
  const [users, setUsers] = useState([]);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState('all');
  const [editUser, setEditUser] = useState(null);
  const [editBal, setEditBal] = useState('');

  const load = async () => { setLoading(true); const d=await api('/bot-api/users'); setUsers(Array.isArray(d)?d:[]); setLoading(false); };
  useEffect(() => { load(); }, []);

  const filtered = useMemo(() => users.filter(u => {
    const q = search.toLowerCase();
    const matchSearch = !q || u.number.includes(q);
    const matchFilter = filter==='all' || (filter==='premium'&&u.premium) || (filter==='banned'&&u.banned);
    return matchSearch && matchFilter;
  }), [users, search, filter]);

  async function togglePremium(u) {
    const r = await api(`/bot-api/users/${encodeURIComponent(u.jid)}/premium`, { method:'POST', body:{ premium:!u.premium } });
    if (r.ok) { toast(`${u.premium?'Removed':'Granted'} premium for ${u.number}`); load(); }
    else toast(r.error, 'error');
  }

  async function toggleBan(u) {
    const r = await api(`/bot-api/users/${encodeURIComponent(u.jid)}/ban`, { method:'POST', body:{ banned:!u.banned } });
    if (r.ok) { toast(`${u.banned?'Unbanned':'Banned'} ${u.number}`); load(); }
    else toast(r.error, 'error');
  }

  async function deleteUser(u) {
    if (!confirm(`Delete user ${u.number}? This removes all their data permanently.`)) return;
    const r = await api(`/bot-api/users/${encodeURIComponent(u.jid)}`, { method:'DELETE' });
    if (r.ok) { toast(`Deleted ${u.number}`); load(); }
    else toast(r.error, 'error');
  }

  async function saveEdit() {
    const r = await api('/bot-api/economy/edit', { method:'POST', body:{ jid:editUser.jid, balance:Number(editBal) } });
    if (r.ok) { toast('Balance updated!'); setEditUser(null); load(); }
    else toast(r.error, 'error');
  }

  const premCount = users.filter(u=>u.premium).length;
  const bannedCount = users.filter(u=>u.banned).length;
  const totalBal = users.reduce((a,u)=>a+(u.balance||0),0);

  return (
    <div style={{padding:24,maxWidth:1200}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">👥 Users</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{users.length} total · {premCount} premium · {bannedCount} banned</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <input className="input" style={{width:200}} placeholder="🔍 Search number..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="btn btn-ghost btn-sm" onClick={load}>🔄</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {[['👥 Total',users.length,'#a78bfa'],['⭐ Premium',premCount,'#fbbf24'],['🚫 Banned',bannedCount,'#f87171'],['💰 Total Coins',totalBal.toLocaleString(),'#4ade80']].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{borderLeft:'3px solid '+c}}>
            <div style={{fontSize:'.72rem',color:'#4c4775',marginBottom:4}}>{l}</div>
            <div style={{fontSize:'1.3rem',fontWeight:800,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['all','All'],['premium','⭐ Premium'],['banned','🚫 Banned']].map(([val,lbl])=>(
          <button key={val} onClick={()=>setFilter(val)} className={`btn btn-sm ${filter===val?'btn-primary':'btn-ghost'}`}>{lbl}</button>
        ))}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {loading ? <div style={{textAlign:'center',padding:40,color:'#4c4775'}}><Spinner/> Loading...</div> : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr><th>Number</th><th>Balance</th><th>Wins</th><th>Status</th><th>Daily</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(u=>(
                  <tr key={u.jid}>
                    <td>
                      <div style={{fontFamily:'monospace',color:'#e2e0f0',fontWeight:600}}>{u.number}</div>
                      {u.banned && <div style={{fontSize:'.68rem',color:'#f87171',marginTop:2}}>🚫 banned</div>}
                    </td>
                    <td><span style={{fontWeight:700,color:'#fbbf24'}}>💵 {(u.balance||0).toLocaleString()}</span></td>
                    <td style={{color:'#60a5fa'}}>{u.wins||0} / {u.losses||0}</td>
                    <td>
                      {u.premium ? <span className="badge badge-yellow">⭐ Premium</span> : <span className="badge badge-gray">Free</span>}
                    </td>
                    <td style={{fontSize:'.75rem',color:'#4c4775'}}>{fmtDateShort(u.dailyLast)}</td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-sm btn-ghost" onClick={()=>{setEditUser(u);setEditBal(String(u.balance||0));}} title="Edit balance">✏️</button>
                        <button className={`btn btn-sm ${u.premium?'btn-ghost':'btn-yellow'}`} onClick={()=>togglePremium(u)} title={u.premium?'Remove premium':'Grant premium'}>{u.premium?'✖️':'⭐'}</button>
                        <button className={`btn btn-sm ${u.banned?'btn-green':'btn-danger'}`} onClick={()=>toggleBan(u)} title={u.banned?'Unban':'Ban'}>{u.banned?'✅':'🚫'}</button>
                        <button className="btn btn-sm btn-danger" onClick={()=>deleteUser(u)} title="Delete user">🗑️</button>
                      </div>
                    </td>
                  </tr>
                ))}
                {!filtered.length && <tr><td colSpan={6} style={{textAlign:'center',padding:36,color:'#4c4775'}}>No users found</td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {editUser && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditUser(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div style={{fontWeight:700,marginBottom:16,fontSize:'1.1rem',color:'#e2e0f0'}}>✏️ Edit User</div>
            <div style={{marginBottom:14,padding:'10px 14px',background:'#1e1b2e',borderRadius:8}}>
              <div style={{fontSize:'.75rem',color:'#4c4775',marginBottom:2}}>NUMBER</div>
              <div style={{fontFamily:'monospace',color:'#a78bfa',fontWeight:700}}>{editUser.number}</div>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:'.75rem',color:'#7c738a',marginBottom:6,fontWeight:600}}>COIN BALANCE</label>
              <input className="input" type="number" value={editBal} onChange={e=>setEditBal(e.target.value)} autoFocus/>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-primary" onClick={saveEdit}>💾 Save</button>
              <button className="btn btn-ghost" onClick={()=>setEditUser(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Broadcast Page ───────────────────────────────────────────────────────────
function BroadcastPage({ toast }) {
  const [msg, setMsg] = useState('');
  const [targets, setTargets] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const charCount = msg.length;

  const TEMPLATES = [
    { label:'🎉 Announcement', text:'📢 *Bot Update!*\n\nHey there! Just letting you know Supreme MD Bot has been updated with new features. Type *!menu* to see what\'s new! 🚀' },
    { label:'⚠️ Maintenance', text:'🔧 *Scheduled Maintenance*\n\nThe bot will be temporarily offline for maintenance. We\'ll be back shortly!\n\nSorry for the inconvenience. 🙏' },
    { label:'🎁 Promo', text:'🎁 *Special Offer!*\n\nPremium features are now available! Get access to all exclusive commands.\n\nContact admin for more info. ⭐' },
  ];

  async function send() {
    if (!msg.trim()) return toast('Enter a message first', 'error');
    setLoading(true); setResult(null);
    const jids = targets.trim() ? targets.split('\n').map(s=>s.trim()).filter(Boolean).map(n=>n.includes('@')?n:n+'@s.whatsapp.net') : [];
    const r = await api('/bot-api/broadcast', { method:'POST', body:{ message:msg, targets:jids.length?jids:undefined } });
    if (r.error) toast(r.error, 'error'); else { setResult(r); toast(`Broadcast sent to ${r.sent} users!`); }
    setLoading(false);
  }

  return (
    <div style={{padding:24,maxWidth:900}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">📢 Broadcast</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>Send messages to all or specific users</div>
        </div>
      </div>

      <div style={{marginBottom:16}}>
        <div style={{fontSize:'.75rem',color:'#7c738a',marginBottom:8,fontWeight:600}}>QUICK TEMPLATES</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {TEMPLATES.map(t=>(
            <button key={t.label} className="btn btn-ghost btn-sm" onClick={()=>setMsg(t.text)}>{t.label}</button>
          ))}
          <button className="btn btn-ghost btn-sm" onClick={()=>setMsg('')}>🗑️ Clear</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card" style={{flex:1}}>
            <div style={{fontWeight:600,marginBottom:14,color:'#c4c0d8',fontSize:'.875rem'}}>✉️ Message</div>
            <textarea className="input" rows={8} style={{resize:'vertical',fontFamily:'monospace',lineHeight:1.6}} placeholder="Type your broadcast message here...&#10;&#10;Supports *bold*, _italic_, ~strikethrough~" value={msg} onChange={e=>setMsg(e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:'.73rem',color:'#4c4775'}}>
              <span>{charCount} characters</span>
              <span>~{Math.ceil(charCount/160)} SMS equiv</span>
            </div>
          </div>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:14,color:'#c4c0d8',fontSize:'.875rem'}}>🎯 Target Numbers</div>
            <textarea className="input" rows={4} style={{resize:'vertical',fontFamily:'monospace',fontSize:'.78rem'}} placeholder={"Leave empty to send to ALL known users\n\n94712345678\n94771234567"} value={targets} onChange={e=>setTargets(e.target.value)}/>
            <div style={{fontSize:'.73rem',color:'#4c4775',marginTop:6}}>
              {targets.trim() ? `${targets.split('\n').filter(s=>s.trim()).length} specific target(s)` : '📢 Will send to all users in database'}
            </div>
          </div>
          <button className="btn btn-primary" onClick={send} disabled={loading} style={{justifyContent:'center',padding:'10px'}}>
            {loading?<><Spinner/> Sending...</>:'📤 Send Broadcast'}
          </button>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:14,color:'#c4c0d8',fontSize:'.875rem'}}>📋 Preview</div>
            <div style={{background:'#0f0d1a',borderRadius:10,padding:14,minHeight:120,fontSize:'.825rem',color:'#c4c0d8',whiteSpace:'pre-wrap',lineHeight:1.6,fontFamily:'system-ui'}}>
              {msg || <span style={{color:'#4c4775'}}>Message preview will appear here...</span>}
            </div>
          </div>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:14,color:'#c4c0d8',fontSize:'.875rem'}}>📈 Last Result</div>
            {result ? (
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[['📬 Total',result.total||'—','#a09cc0'],['✅ Sent',result.sent,'#4ade80'],['❌ Failed',result.failed,result.failed>0?'#f87171':'#4c4775']].map(([l,v,c])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 12px',background:'#0f0d1a',borderRadius:8,alignItems:'center'}}>
                    <span style={{color:'#7c738a',fontSize:'.825rem'}}>{l}</span>
                    <span style={{fontWeight:800,color:c,fontSize:'1rem'}}>{v}</span>
                  </div>
                ))}
                {result.errors && result.errors.length > 0 && (
                  <div style={{fontSize:'.73rem',color:'#f87171',background:'#dc262608',border:'1px solid #dc262622',borderRadius:6,padding:'8px 10px'}}>
                    Failed: {result.errors.slice(0,3).map(e=>e.jid.split('@')[0]).join(', ')}{result.errors.length>3?` +${result.errors.length-3} more`:''}
                  </div>
                )}
              </div>
            ) : <div className="empty-state" style={{padding:'24px 0'}}><span className="icon" style={{fontSize:'2rem'}}>📤</span><p>No broadcast sent yet</p></div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Settings Page ────────────────────────────────────────────────────────────
function SettingsPage({ toast }) {
  const [cfg, setCfg] = useState(null);
  const [saving, setSaving] = useState(false);
  const [restarting, setRestarting] = useState(false);

  useEffect(() => { api('/bot-api/settings').then(d=>setCfg(d)); }, []);

  async function save() {
    setSaving(true);
    const r = await api('/bot-api/settings', { method:'POST', body:cfg });
    if (r.ok) toast('Settings saved! Restart bot to apply prefix/name changes.'); else toast(r.error,'error');
    setSaving(false);
  }

  async function restart() {
    if (!confirm('Restart the bot? It will briefly go offline.')) return;
    setRestarting(true);
    await api('/bot-api/admin/restart', { method:'POST', body:{} });
    toast('Restart queued — bot will reconnect in ~5s', 'info');
    setTimeout(()=>setRestarting(false), 8000);
  }

  if (!cfg) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200,gap:12,color:'#4c4775'}}><Spinner/> Loading settings...</div>;

  const textFields = [
    ['Bot Name', 'botName', 'text', false, 'Supreme MD'],
    ['Command Prefix', 'prefix', 'text', false, '!'],
    ['Premium Code', 'premiumCode', 'text', false, ''],
    ['Owner Number', 'ownerNumber', 'text', true, ''],
  ];

  const toggles = [
    ['autoRead', '📖 Auto Read Messages', 'Automatically mark all messages as read'],
    ['autoTyping', '⌨️ Auto Typing Status', 'Show typing indicator when processing commands'],
    ['nsfwEnabled', '🔞 NSFW Commands', 'Allow adult content commands (phsearch, xnxx, etc.)'],
  ];

  return (
    <div style={{padding:24,maxWidth:900}}>
      <div className="section-header">
        <h2 className="page-title">⚙️ Settings</h2>
        <button className="btn btn-primary" onClick={save} disabled={saving}>
          {saving?<><Spinner/> Saving...</>:'💾 Save Settings'}
        </button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div style={{fontWeight:600,marginBottom:16,color:'#c4c0d8',fontSize:'.875rem'}}>🤖 Bot Configuration</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {textFields.map(([label,key,type,disabled,placeholder])=>(
              <div key={key}>
                <label style={{display:'block',fontSize:'.75rem',color:'#7c738a',marginBottom:6,fontWeight:600}}>{label.toUpperCase()}</label>
                <input className="input" type={type} placeholder={placeholder} value={cfg[key]||''} onChange={e=>setCfg(c=>({...c,[key]:e.target.value}))} disabled={disabled} style={disabled?{opacity:.5,cursor:'not-allowed'}:{}}/>
                {disabled && <div style={{fontSize:'.7rem',color:'#4c4775',marginTop:4}}>Set via environment variable</div>}
              </div>
            ))}
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card">
            <div style={{fontWeight:600,marginBottom:16,color:'#c4c0d8',fontSize:'.875rem'}}>🔧 Feature Toggles</div>
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {toggles.map(([key,label,desc])=>(
                <div key={key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid #1e1b2e22'}}>
                  <div style={{flex:1,paddingRight:16}}>
                    <div style={{fontSize:'.875rem',color:'#c4c0d8',fontWeight:500}}>{label}</div>
                    <div style={{fontSize:'.73rem',color:'#4c4775',marginTop:2}}>{desc}</div>
                  </div>
                  <Toggle checked={!!cfg[key]} onChange={v=>setCfg(c=>({...c,[key]:v}))}/>
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{background:'#dc262604',border:'1px solid #dc262618'}}>
            <div style={{fontWeight:600,marginBottom:10,color:'#f87171',fontSize:'.875rem'}}>⚠️ Danger Zone</div>
            <p style={{fontSize:'.8rem',color:'#7c738a',marginBottom:14,lineHeight:1.5}}>Restart the bot connection. WhatsApp session will be preserved but the bot will briefly go offline.</p>
            <button className="btn btn-danger" onClick={restart} disabled={restarting}>
              {restarting?<><Spinner/> Restarting...</>:'🔄 Restart Bot'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Economy Page ─────────────────────────────────────────────────────────────
function EconomyPage({ toast }) {
  const [users, setUsers] = useState([]);
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [newBal, setNewBal] = useState('');
  const [loading, setLoading] = useState(false);
  const [sortBy, setSortBy] = useState('balance');

  const load = async () => { setLoading(true); const d=await api('/bot-api/economy'); setUsers(Array.isArray(d)?d:[]); setLoading(false); };
  useEffect(()=>{ load(); },[]);

  async function saveEdit() {
    const r = await api('/bot-api/economy/edit',{ method:'POST', body:{ jid:editing.jid, balance:Number(newBal) } });
    if (r.ok) { toast('Balance updated!'); setEditing(null); load(); } else toast(r.error,'error');
  }
  async function resetAll() {
    if (!confirm('Reset ALL balances to 0?')) return;
    const r = await api('/bot-api/economy/reset',{ method:'POST', body:{} });
    if (r.ok) { toast('Economy reset!'); load(); } else toast(r.error,'error');
  }

  const sorted = useMemo(() => {
    const filtered = users.filter(u => u.number.includes(search) || u.jid.includes(search));
    return [...filtered].sort((a,b) => sortBy==='balance' ? (b.balance||0)-(a.balance||0) : (b.wins||0)-(a.wins||0));
  }, [users, search, sortBy]);

  const totalCoins = users.reduce((a,u)=>a+(u.balance||0),0);
  const richest = users.length ? [...users].sort((a,b)=>(b.balance||0)-(a.balance||0))[0] : null;

  return (
    <div style={{padding:24,maxWidth:1100}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">💰 Economy</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{users.length} users · {totalCoins.toLocaleString()} total coins</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <input className="input" style={{width:200}} placeholder="🔍 Search number..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="btn btn-danger btn-sm" onClick={resetAll}>🗑️ Reset All</button>
          <button className="btn btn-ghost btn-sm" onClick={load}>🔄</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:12,marginBottom:20}}>
        {[
          ['💰 Total Coins', totalCoins.toLocaleString(), '#fbbf24'],
          ['👑 Richest', richest?.number||'—', '#a78bfa'],
          ['💵 Top Balance', richest?(richest.balance||0).toLocaleString():'—', '#4ade80'],
          ['⭐ Premium', users.filter(u=>u.premium).length, '#60a5fa'],
        ].map(([l,v,c])=>(
          <div key={l} className="card-sm" style={{borderLeft:'3px solid '+c}}>
            <div style={{fontSize:'.72rem',color:'#4c4775',marginBottom:4}}>{l}</div>
            <div style={{fontSize:'1.1rem',fontWeight:800,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}>
        <span style={{fontSize:'.75rem',color:'#4c4775'}}>Sort by:</span>
        {[['balance','💵 Balance'],['wins','🏆 Wins']].map(([val,lbl])=>(
          <button key={val} onClick={()=>setSortBy(val)} className={`btn btn-sm ${sortBy===val?'btn-primary':'btn-ghost'}`}>{lbl}</button>
        ))}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {loading ? <div style={{textAlign:'center',padding:40,color:'#4c4775'}}><Spinner/></div> : (
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr><th>#</th><th>Number</th><th>Balance</th><th>Premium</th><th>Wins</th><th>Daily</th><th>Edit</th></tr></thead>
              <tbody>
                {sorted.map((u,i)=>(
                  <tr key={u.jid}>
                    <td style={{color:'#4c4775',fontSize:'.78rem'}}>{i+1}</td>
                    <td style={{fontFamily:'monospace',color:'#e2e0f0',fontWeight:600}}>{u.number}</td>
                    <td><span style={{fontWeight:800,color:'#fbbf24',fontSize:'.9rem'}}>💵 {(u.balance||0).toLocaleString()}</span></td>
                    <td>{u.premium?<span className="badge badge-yellow">⭐ Premium</span>:<span style={{color:'#2e2b45'}}>—</span>}</td>
                    <td style={{color:'#60a5fa',fontWeight:600}}>{u.wins||0}</td>
                    <td style={{fontSize:'.75rem',color:'#4c4775'}}>{fmtDateShort(u.dailyLast)}</td>
                    <td><button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(u);setNewBal(String(u.balance||0));}}>✏️ Edit</button></td>
                  </tr>
                ))}
                {!sorted.length && <tr><td colSpan={7} style={{textAlign:'center',padding:36,color:'#4c4775'}}>No users found</td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {editing && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditing(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div style={{fontWeight:700,marginBottom:16,fontSize:'1.1rem',color:'#e2e0f0'}}>✏️ Edit Balance</div>
            <div style={{marginBottom:14,padding:'10px 14px',background:'#1e1b2e',borderRadius:8}}>
              <div style={{fontSize:'.73rem',color:'#4c4775',marginBottom:2}}>USER</div>
              <div style={{fontFamily:'monospace',color:'#a78bfa',fontWeight:700}}>{editing.number}</div>
              <div style={{fontSize:'.73rem',color:'#4c4775',marginTop:4}}>Current: 💵 {(editing.balance||0).toLocaleString()}</div>

            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:'.75rem',color:'#7c738a',marginBottom:6,fontWeight:600}}>NEW BALANCE</label>

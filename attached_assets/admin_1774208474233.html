              <button className="btn btn-ghost" onClick={()=>setEditing(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Files Page ───────────────────────────────────────────────────────────────
function FilesPage({ toast }) {
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(new Set());
  const [typeFilter, setTypeFilter] = useState('all');

  const load = async () => { setLoading(true); const d=await api('/bot-api/files'); setFiles(Array.isArray(d)?d:[]); setLoading(false); setSelected(new Set()); };
  useEffect(()=>{ load(); },[]);

  async function delFile(name) {
    const r = await api(`/bot-api/files/${encodeURIComponent(name)}`, { method:'DELETE' });
    if (r.ok) { toast(`Deleted ${name}`); load(); } else toast(r.error, 'error');
  }

  async function deleteSelected() {
    if (!confirm(`Delete ${selected.size} file(s)?`)) return;
    let failed = 0;
    for (const name of selected) {
      const r = await api(`/bot-api/files/${encodeURIComponent(name)}`, { method:'DELETE' });
      if (!r.ok) failed++;
    }
    toast(`Deleted ${selected.size-failed} file(s)${failed?`, ${failed} failed`:''}`);
    load();
  }

  function toggleSelect(name) {
    setSelected(s => { const n=new Set(s); n.has(name)?n.delete(name):n.add(name); return n; });
  }

  function selectAll() {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(f=>f.name)));
  }

  const types = useMemo(()=>['all',...new Set(files.map(f=>f.ext))],[files]);
  const filtered = useMemo(()=>files.filter(f=>{
    const matchType = typeFilter==='all'||f.ext===typeFilter;
    const matchSearch = !search || f.name.toLowerCase().includes(search.toLowerCase());
    return matchType && matchSearch;
  }),[files,typeFilter,search]);

  const totalSize = files.reduce((a,f)=>a+parseFloat(f.sizeMB||0),0).toFixed(1);

  return (
    <div style={{padding:24,maxWidth:1100}}>
      <div className="section-header">
        <div>
          <h2 className="page-title">📁 File Manager</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{files.length} files · {totalSize} MB total</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {selected.size > 0 && <button className="btn btn-danger btn-sm" onClick={deleteSelected}>🗑️ Delete {selected.size} selected</button>}
          <input className="input" style={{width:180}} placeholder="🔍 Search files..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className="btn btn-ghost btn-sm" onClick={load}>🔄</button>
        </div>
      </div>

      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
        {types.map(t=>(
          <button key={t} onClick={()=>setTypeFilter(t)} className={`btn btn-sm ${typeFilter===t?'btn-primary':'btn-ghost'}`}>
            {t === 'all' ? `All (${files.length})` : `${extIcon(t)} .${t} (${files.filter(f=>f.ext===t).length})`}
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div className="card"><div className="empty-state"><span className="icon">📁</span><h3>No files found</h3><p>Downloaded media will appear here</p></div></div>
      ) : (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead>
                <tr>
                  <th style={{width:36}}>
                    <input type="checkbox" style={{cursor:'pointer'}} checked={selected.size===filtered.length&&filtered.length>0} onChange={selectAll}/>
                  </th>
                  <th>File Name</th>
                  <th>Type</th>
                  <th>Size</th>
                  <th>Modified</th>
                  <th>Delete</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(f=>(
                  <tr key={f.name} style={{background:selected.has(f.name)?'#8b5cf60a':''}}>
                    <td>
                      <input type="checkbox" style={{cursor:'pointer'}} checked={selected.has(f.name)} onChange={()=>toggleSelect(f.name)}/>
                    </td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:'1rem'}}>{extIcon(f.ext)}</span>
                        <span style={{fontFamily:'monospace',fontSize:'.78rem',color:'#c4c0d8',maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                      </div>
                    </td>
                    <td><span className="badge badge-gray">.{f.ext}</span></td>
                    <td style={{fontFamily:'monospace',color:'#60a5fa',fontSize:'.8rem'}}>{f.sizeMB} MB</td>
                    <td style={{fontSize:'.75rem',color:'#4c4775'}}>{new Date(f.modified).toLocaleString()}</td>
                    <td><button className="btn btn-danger btn-sm" onClick={()=>delFile(f.name)}>🗑️</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Logs Page ────────────────────────────────────────────────────────────────
function LogsPage() {
  const [logs, setLogs] = useState([]);
  const [search, setSearch] = useState('');
  const [autoScroll, setAutoScroll] = useState(true);
  const [level, setLevel] = useState('all');
  const logRef = useRef(null);

  const load = useCallback(() => api('/bot-api/logs?limit=200').then(d => { if (Array.isArray(d)) setLogs(d); }), []);
  useEffect(() => { load(); const iv = setInterval(load, 5000); return () => clearInterval(iv); }, []);

  useEffect(() => {
    if (!socket) return;
    const onLog = l => setLogs(prev => [l, ...prev].slice(0, 300));
    socket.on('log', onLog);
    return () => socket.off('log', onLog);
  }, []);

  useEffect(() => {
    if (autoScroll && logRef.current) logRef.current.scrollTop = 0;
  }, [logs, autoScroll]);

  const filtered = useMemo(() => {
    return logs.filter(l => {
      const txt = typeof l === 'string' ? l : (l.message||l.msg||JSON.stringify(l));
      const matchSearch = !search || txt.toLowerCase().includes(search.toLowerCase());
      const matchLevel = level==='all' || (level==='error'&&(/error|fail/i.test(txt))) || (level==='warn'&&(/warn/i.test(txt)));
      return matchSearch && matchLevel;
    });
  }, [logs, search, level]);

  function getLineClass(l) {
    const txt = typeof l === 'string' ? l : (l.message||l.msg||'');
    if (/error|fail|crash/i.test(txt)) return 'log-line log-error';
    if (/warn/i.test(txt)) return 'log-line log-warn';
    if (/connect|start|ready|loaded/i.test(txt)) return 'log-line log-info';
    return 'log-line';
  }

  function fmtLog(l) {
    if (typeof l === 'string') return l;
    if (l.message || l.msg) return `[${l.level||'INFO'}] ${l.message||l.msg}`;
    return JSON.stringify(l);
  }

  return (
    <div style={{padding:24,maxWidth:1100,display:'flex',flexDirection:'column',height:'calc(100vh - 48px)'}}>
      <div className="section-header" style={{flexShrink:0}}>
        <div>
          <h2 className="page-title">📜 Live Logs</h2>
          <div style={{fontSize:'.8rem',color:'#4c4775',marginTop:2}}>{filtered.length} entries · auto-updates every 5s</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <input className="input" style={{width:200}} placeholder="🔍 Filter logs..." value={search} onChange={e=>setSearch(e.target.value)}/>
          {[['all','All'],['error','❌ Errors'],['warn','⚠️ Warns']].map(([val,lbl])=>(
            <button key={val} onClick={()=>setLevel(val)} className={`btn btn-sm ${level===val?'btn-primary':'btn-ghost'}`}>{lbl}</button>
          ))}
          <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:'.8rem',color:'#7c738a'}}>
            <Toggle checked={autoScroll} onChange={setAutoScroll}/>
            Auto
          </label>
          <button className="btn btn-ghost btn-sm" onClick={load}>🔄</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setLogs([])}>🗑️ Clear</button>
        </div>
      </div>
      <div className="card" ref={logRef} style={{flex:1,overflowY:'auto',padding:12,fontFamily:'monospace'}}>
        {filtered.length === 0 ? (
          <div className="empty-state"><span className="icon">📜</span><h3>No logs</h3><p>Bot activity will stream here in real-time</p></div>
        ) : (
          filtered.map((l,i) => (
            <div key={i} className={getLineClass(l)}>{fmtLog(l)}</div>
          ))
        )}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => {
    try { const t=localStorage.getItem('admin_token'); if(!t)return null; return {token:t}; } catch { return null; }
  });
  const [page, setPage] = useState('dashboard');
  const [botStatus, setBotStatus] = useState('Connecting');
  const [collapsed, setCollapsed] = useState(false);
  const { show: toast, Toasts } = useToast();

  useEffect(() => {
    if (!socket || !user) return;
    socket.on('update', d => { if (d.status) setBotStatus(d.status); });
    if (user) api('/bot-api/stats').then(d => { if (d.status) setBotStatus(d.status); }).catch(()=>{});
  }, [user]);

  function onLogin(d) { setUser(d); setBotStatus('Connecting'); }
  function onLogout() { localStorage.removeItem('admin_token'); setUser(null); }

  if (!user) return <><LoginPage onLogin={onLogin}/><Toasts/></>;

  const pages = {
    dashboard: <DashboardPage toast={toast}/>,
    sessions:  <SessionsPage toast={toast}/>,
    commands:  <CommandsPage/>,
    users:     <UsersPage toast={toast}/>,
    broadcast: <BroadcastPage toast={toast}/>,
    settings:  <SettingsPage toast={toast}/>,
    economy:   <EconomyPage toast={toast}/>,
    files:     <FilesPage toast={toast}/>,
    logs:      <LogsPage/>,
  };

  return (
    <>
      <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
        <Sidebar page={page} setPage={setPage} onLogout={onLogout} botStatus={botStatus} collapsed={collapsed} setCollapsed={setCollapsed}/>
        <div style={{flex:1,overflowY:'auto',background:'#0f0d1a'}}>
          {pages[page] || pages.dashboard}
        </div>
      </div>
      <Toasts/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
